services:
  - type: web
    name: philly-home-valuator
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 05_dashboard_app:server --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
